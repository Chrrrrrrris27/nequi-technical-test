<ion-item-sliding #sliding class="item-sliding">
  <ion-item (click)="onClickEmitter()" class="todo-item" [color]="backgroundColor">
    <ng-content></ng-content>
  </ion-item>
  
  <ion-item-options side="start">
    <ion-item-option (click)="onEditEmitter(sliding)">
      <ion-icon name="pencil"></ion-icon>
      Editar
    </ion-item-option>
  </ion-item-options>
  <ion-item-options side="end">
    <ion-item-option color="danger" (click)="onDeleteEmitter(sliding)">
      <ion-icon name="trash"></ion-icon>
      Eliminar
    </ion-item-option>
  </ion-item-options>
</ion-item-sliding>
