<ion-content>
  @if(!isLoading()) {
    <categories-list [categories]="categories()">
    </categories-list>
    <ion-fab slot="fixed" vertical="bottom" horizontal="end">
      <ion-fab-button (click)="setModalOpen(true)">
        <ion-icon name="add">
        </ion-icon>
      </ion-fab-button>
    </ion-fab>
  }
  <ion-modal [isOpen]="isModalOpen">
    <ng-template>
      <ion-header>
        <ion-toolbar>
          <ion-title>Crear categoría</ion-title>
          <ion-buttons slot="end">
            <ion-button color="dark" (click)="setModalOpen(false)">
              <ion-icon name="close"></ion-icon>
            </ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>
      <ion-content class="ion-padding">
        <category-form
          (submitEmitter)="onCreateCategory($event)"
        ></category-form>
      </ion-content>
    </ng-template>
  </ion-modal>
</ion-content>
