@if(categories.length > 0) {
  <ion-list lines="none" inset="true">
    @for(category of categories; track category.id) {
      <category-item
        [category]="category"
        (editCategoryEmitter)="onEditedCategory($event)"
        (deleteCategoryEmitter)="onDeleteCategory($event)"
      >
      </category-item>
    }
  </ion-list>
  <ion-modal [isOpen]="isModalOpen">
    <ng-template>
      <ion-header>
        <ion-toolbar>
          <ion-title>Editar categoría</ion-title>
          <ion-buttons slot="end">
            <ion-button color="dark" (click)="setModalOpen(false)">
              <ion-icon name="close"></ion-icon>
            </ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>
      <ion-content class="ion-padding">
        <category-form
          [defaultCategory]="selectedCategory"
          (submitEmitter)="onUpdateCategory($event)"
        ></category-form>
      </ion-content>
    </ng-template>
  </ion-modal>
} @else {
  <ion-note>No hay categorías</ion-note>
}
