<ion-content class="ion-padding todos-page_container">
  @if(!isLoading()) {
    <todo-list [todos]="todos()"></todo-list>
  }
  <ion-fab slot="fixed" vertical="bottom" horizontal="end">
    <ion-fab-button (click)="onCreateTodo()">
      <ion-icon name="add">
      </ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
