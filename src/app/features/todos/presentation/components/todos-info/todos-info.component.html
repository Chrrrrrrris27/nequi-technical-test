<ion-grid class="ion-padding-start ion-padding-end">
  <ion-row>
    <ion-col size="6">
      <ion-label>
        <ion-icon slot="start" name="checkbox" color="dark"></ion-icon>
        Completadas:
        {{ completed }}
      </ion-label>
      
    </ion-col>
    <ion-col size="6">
      <ion-label>
          <ion-icon slot="start" name="square-outline" color="dark"></ion-icon>
          Pendientes:
          {{ pendings }}
        </ion-label>
    </ion-col>
  </ion-row>
</ion-grid>
