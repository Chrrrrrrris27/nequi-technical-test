<ion-item-sliding #sliding class="todo-sliding">
  <ion-item (click)="onToggleTodoEmitter()" class="todo-item">
    <ion-icon slot="start" [name]="todo.completed && 'checkbox' || 'square-outline'" [color]="todo.completed && 'success' || ''"></ion-icon>
    <ion-label class="ion-text-wrap">{{todo.title}}</ion-label>
  </ion-item>
  
  <ion-item-options side="start">
    <ion-item-option>
      <ion-icon name="pencil"></ion-icon>
      Editar
    </ion-item-option>
  </ion-item-options>
  <ion-item-options side="end">
    <ion-item-option color="danger" (click)="onDeleteTodoEmitter(sliding)">
      <ion-icon name="trash"></ion-icon>
      Eliminar
    </ion-item-option>
  </ion-item-options>
</ion-item-sliding>
