<sliding-button
  [backgroundColor]="todo.completed && 'secondary' || 'warning'"
  (clickEmitter)="onToggleTodoEmitter()"
  (editOptionEmitter)="onEditTodoEmitter()"
  (deleteOptionEmitter)="onDeleteTodoEmitter()"
>
  <ion-icon slot="start" [name]="todo.completed && 'checkbox' || 'square-outline'" [color]="todo.completed && 'dark' || ''"></ion-icon>
  <ion-label
    [class]="`ion-text-wrap todo-label ${todo.completed && 'completed'}`"
  >
    {{todo.title}}
  </ion-label>
</sliding-button>
